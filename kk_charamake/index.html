<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>キャラクターメイク</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- ===== 左パネル ===== -->
  <div id="left-panel">

    <!-- キャラ名 + セーブボタン行 -->
    <div id="chara-header">
      <div id="chara-name-wrap">
        <span class="chara-label">名前</span>
        <input type="text" id="chara-name" value="新しいキャラ" />
      </div>
      <div id="header-btns">
        <button class="hbtn" id="btn-save">保存</button>
        <button class="hbtn" id="btn-load">読込</button>
        <button class="hbtn red" id="btn-init">初期化</button>
      </div>
    </div>

    <!-- メインカテゴリタブ (水平) -->
    <div id="main-tabs">
      <button class="main-tab active" data-cat="body">体型</button>
      <button class="main-tab" data-cat="face">顔</button>
      <button class="main-tab" data-cat="hair">髪型</button>
      <button class="main-tab" data-cat="clothes">服装</button>
      <button class="main-tab" data-cat="accessory">アクセ</button>
      <button class="main-tab" data-cat="expression">表情</button>
      <button class="main-tab" data-cat="pose">ポーズ</button>
      <button class="main-tab" data-cat="motion">モーション</button>
      <button class="main-tab" data-cat="shoot">撮影</button>
      <button class="main-tab" data-cat="scene">シーン</button>
      <button class="main-tab" data-cat="preset">プリセット</button>
      <button class="main-tab" data-cat="param">設定</button>
    </div>

    <!-- サブカテゴリタブ -->
    <div id="sub-tabs">
      <!-- JS で動的に生成 -->
    </div>

    <!-- コンテンツエリア -->
    <div id="content-area">
      <!-- JS で動的に生成 -->
    </div>

    <!-- カラーピッカー (服・髪の色変更) -->
    <div id="color-panel" class="hidden">
      <div class="color-section-label">メインカラー</div>
      <div class="color-swatch-row" id="color-swatches-main"></div>
      <input type="color" id="color-picker-main" value="#ff88aa" />
      <div class="color-section-label">サブカラー</div>
      <div class="color-swatch-row" id="color-swatches-sub"></div>
      <input type="color" id="color-picker-sub" value="#ffffff" />
    </div>

  </div>

  <!-- ===== 3D ビューポート ===== -->
  <div id="viewport">
    <canvas id="three-canvas"></canvas>

    <!-- ローディング -->
    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
      <div id="loading-msg">モデルを読み込み中...</div>
    </div>

    <!-- カメラコントロール (下部) -->
    <div id="cam-controls">
      <button class="cam-btn" id="cam-reset" title="リセット">⟳</button>
      <button class="cam-btn" id="cam-front" title="正面">前</button>
      <button class="cam-btn" id="cam-side" title="横">横</button>
      <button class="cam-btn" id="cam-top" title="上">上</button>
      <button class="cam-btn" id="cam-face" title="顔アップ">顔</button>
      <div class="cam-sep"></div>
      <label class="cam-label">光</label>
      <input type="range" id="sl-light" min="0" max="3" step="0.1" value="1.2" class="cam-slider" />
      <div class="cam-sep"></div>
      <button class="cam-btn" id="btn-wire">WF</button>
      <div class="cam-sep"></div>
      <button class="cam-btn" id="btn-toggle-clothes" title="着衣を表示/非表示">着衣</button>
      <div class="cam-sep"></div>
      <button class="cam-btn" id="btn-paint3d">3Dペイント</button>
    </div>

    <!-- 3D ペイントツールバー -->
    <div id="paint3d-bar" class="hidden">
      <div class="p3d-title">3D モデルペイント</div>

      <div class="p3d-row">
        <span class="p3d-lbl">部位</span>
        <select id="p3d-part" class="p3d-sel">
          <option value="all">全体</option>
          <option value="body">ボディ</option>
          <option value="head">頭・顔</option>
          <option value="hair">髪</option>
          <option value="clothes">服装</option>
        </select>
      </div>

      <div class="p3d-row">
        <button id="p3d-brush" class="p3d-btn p3d-active">ブラシ</button>
        <button id="p3d-eraser" class="p3d-btn">消しゴム</button>
      </div>

      <div class="p3d-row">
        <span class="p3d-lbl">色</span>
        <input type="color" id="p3d-color" value="#ff0000" class="p3d-color-pick">
      </div>
      <div class="p3d-swatches">
        <div class="p3d-swatch" data-c="#ff2244" style="background:#ff2244"></div>
        <div class="p3d-swatch" data-c="#ff8800" style="background:#ff8800"></div>
        <div class="p3d-swatch" data-c="#ffd700" style="background:#ffd700"></div>
        <div class="p3d-swatch" data-c="#44cc44" style="background:#44cc44"></div>
        <div class="p3d-swatch" data-c="#4488ff" style="background:#4488ff"></div>
        <div class="p3d-swatch" data-c="#cc44ff" style="background:#cc44ff"></div>
        <div class="p3d-swatch" data-c="#ff88cc" style="background:#ff88cc"></div>
        <div class="p3d-swatch" data-c="#00ddff" style="background:#00ddff"></div>
        <div class="p3d-swatch" data-c="#ffffff" style="background:#ffffff;border:1px solid #333"></div>
        <div class="p3d-swatch" data-c="#111111" style="background:#111111"></div>
        <div class="p3d-swatch" data-c="#c8a030" style="background:#c8a030"></div>
        <div class="p3d-swatch" data-c="#8b4513" style="background:#8b4513"></div>
      </div>

      <div class="p3d-sep"></div>

      <div class="p3d-sl-row">
        <span class="p3d-sl-lbl">ブラシ</span>
        <input type="range" id="p3d-size" min="5" max="120" step="1" value="30">
        <span class="p3d-sl-val" id="p3d-size-val">30px</span>
      </div>
      <div class="p3d-sl-row">
        <span class="p3d-sl-lbl">不透明度</span>
        <input type="range" id="p3d-opacity" min="5" max="100" step="5" value="85">
        <span class="p3d-sl-val" id="p3d-opacity-val">85%</span>
      </div>
      <div class="p3d-sl-row">
        <span class="p3d-sl-lbl">濡れ</span>
        <input type="range" id="p3d-wet" min="0" max="20" step="1" value="0">
        <span class="p3d-sl-val" id="p3d-wet-val">0</span>
      </div>

      <div class="p3d-sep"></div>

      <button id="p3d-undo" class="p3d-action-btn">↩ 戻す (Undo)</button>
      <button id="p3d-clear" class="p3d-action-btn">部位クリア</button>
      <button id="p3d-clear-all" class="p3d-action-btn">全クリア</button>
      <div class="p3d-hint">クリックまたはドラッグで塗る<br>モデル上でのみ描画されます</div>
      <button id="p3d-exit" class="p3d-action-btn p3d-exit-btn">✕ 終了</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
